[general]
import = [
     "~/.config/alacritty/catppuccin-mocha.toml"
]

[font]
size = 18

[font.bold]
family = "Anonymice Pro Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Anonymice Pro Nerd Font Mono"
style = "Light Italic"

[font.normal]
family = "Anonymice Pro Nerd Font Mono"
style = "Regular"

[window]
opacity = 0.6
dynamic_padding = true

[window.padding]
x = 8
y = 0

[env]
TERM = 'xterm-256color'
